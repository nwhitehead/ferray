[workspace]

[package]
name = "ferray-bench"
version = "0.1.0"
edition = "2024"

[dependencies]
ferray-core = { path = "../../ferray-core" }
ferray-ufunc = { path = "../../ferray-ufunc" }
ferray-stats = { path = "../../ferray-stats" }
ferray-linalg = { path = "../../ferray-linalg" }
ferray-fft = { path = "../../ferray-fft" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
num-complex = "0.4"
core-math = "1.0"

[profile.release]
lto = "fat"
codegen-units = 1
